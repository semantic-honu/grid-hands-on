services:

  backend:
    build:
      context: ./backend
      # 開発
      dockerfile: Dockerfile.dev
      # 本番
      # dockerfile: Dockerfile
    container_name: grid_app_backend
    volumes:
      - ./backend:/backend
    working_dir: /backend
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Tokyo

  frontend:
    build:
      context: ./frontend
      # 開発
      dockerfile: Dockerfile.dev
      # 本番
      # dockerfile: Dockerfile
    container_name: grid_app_frontend
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    working_dir: /frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # ホストとコンテナ間のファイル変更検知を安定させる
    depends_on:
      - backend